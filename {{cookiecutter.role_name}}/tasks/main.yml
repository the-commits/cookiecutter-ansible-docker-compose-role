---
- name: Build docker compose command
  ansible.builtin.set_fact:
    {{ cookiecutter.role_name }}_compose_cmd: "docker compose -f {{ {{ cookiecutter.role_name }}_base_dir }}/docker-compose.yml"

- name: Create base directory
  ansible.builtin.file:
    path: "{{ {{ cookiecutter.role_name }}_base_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ {{ cookiecutter.role_name }}_base_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"
  notify: restart {{ cookiecutter.role_name }}

- name: Create Docker network
  community.docker.docker_network:
    name: "{{ {{ cookiecutter.role_name }}_docker_network }}"
    driver: bridge
    state: present

- name: Check if containers are already running
  ansible.builtin.command:
    cmd: "{{ {{ cookiecutter.role_name }}_compose_cmd }} ps --format json"
  register: compose_ps
  changed_when: false
  failed_when: false

- name: Pull Docker images
  ansible.builtin.command:
    cmd: "{{ {{ cookiecutter.role_name }}_compose_cmd }} pull"
  register: pull_result
  changed_when: "'Downloaded' in pull_result.stdout"
  when: compose_ps.stdout_lines | length == 0

- name: Start containers
  ansible.builtin.command:
    cmd: "{{ {{ cookiecutter.role_name }}_compose_cmd }} up -d"
  when: compose_ps.stdout_lines | length == 0
